services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: stockops
      POSTGRES_PASSWORD: stockops
      POSTGRES_USER: stockops
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stockops -d stockops"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - stockops_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    profiles:
      - production
      - full

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "${API_PORT:-4000}:4000"
    environment:
      DATABASE_URL: postgresql://stockops:stockops@postgres:5432/stockops
      APP_DATA_SOURCE: database
      API_PORT: "4000"
      API_CORS_ORIGIN: http://localhost:3000
      STOCKOPS_QUEUE_DRIVER: bullmq
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - production

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://stockops:stockops@postgres:5432/stockops
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - production

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      DATABASE_URL: postgresql://stockops:stockops@postgres:5432/stockops
      STOCKOPS_QUEUE_DRIVER: bullmq
      REDIS_URL: redis://redis:6379
      WORKER_METRICS_PORT: 4001
    expose:
      - "4001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - production

  prometheus:
    image: prom/prometheus:v2.53.0
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - api
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:11.1.0
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: stockops
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    profiles:
      - monitoring

volumes:
  prometheus_data:
  grafana_data:
  stockops_postgres_data:
