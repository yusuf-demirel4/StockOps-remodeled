name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: stockops_test
          POSTGRES_USER: stockops
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stockops -d stockops_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://stockops:test@localhost:5432/stockops_test
      SHADOW_DATABASE_URL: postgresql://stockops:test@localhost:5432/stockops_test
      APP_DATA_SOURCE: demo
      API_PORT: 4000
      API_CORS_ORIGIN: http://localhost:3000
      API_DEMO_TOKEN: ci_test_token
      STOCKOPS_QUEUE_DRIVER: memory
      NOTIFICATION_PROVIDER: console

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Unit & Integration tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Apply database migrations
        run: npm run prisma:migrate:deploy

      - name: Seed database
        run: npm run prisma:seed
        env:
          API_DEMO_TOKEN: stockops_demo_api_key

      - name: Database smoke test
        run: npm run smoke:database
        env:
          APP_DATA_SOURCE: database
          API_DEMO_TOKEN: stockops_demo_api_key

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: validate

    env:
      APP_DATA_SOURCE: demo
      PLAYWRIGHT_BASE_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: apps/web

      - name: Build web app
        run: npm run build --filter=web
        env:
          APP_DATA_SOURCE: demo

      - name: Run E2E tests
        run: npm run test:e2e
        working-directory: apps/web
        env:
          CI: true
          APP_DATA_SOURCE: demo
          PLAYWRIGHT_BASE_URL: http://localhost:3000

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 30

      - name: Upload test screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: apps/web/test-results/
          retention-days: 7

  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Check for known vulnerabilities
        run: npx --yes audit-ci --high
        continue-on-error: true
