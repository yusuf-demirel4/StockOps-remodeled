name: Continuous Deployment

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy to"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository }}/api
  WEB_IMAGE: ghcr.io/${{ github.repository }}/web
  WORKER_IMAGE: ghcr.io/${{ github.repository }}/worker

jobs:
  build_and_push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.version.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image tag
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "image_tag=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "image_tag=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: |
            ${{ env.API_IMAGE }}:${{ steps.version.outputs.image_tag }}
            ${{ env.API_IMAGE }}:sha-${{ github.sha }}

      - name: Build and push Web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.web
          push: true
          tags: |
            ${{ env.WEB_IMAGE }}:${{ steps.version.outputs.image_tag }}
            ${{ env.WEB_IMAGE }}:sha-${{ github.sha }}

      - name: Build and push Worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.worker
          push: true
          tags: |
            ${{ env.WORKER_IMAGE }}:${{ steps.version.outputs.image_tag }}
            ${{ env.WORKER_IMAGE }}:sha-${{ github.sha }}

  migrate:
    name: Database Migration
    runs-on: ubuntu-latest
    needs: build_and_push
    environment: ${{ inputs.environment || 'production' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Prisma migrations
        run: npm run prisma:migrate:deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  deploy:
    name: Deploy to Environment
    runs-on: ubuntu-latest
    needs: [migrate, build_and_push]
    environment: ${{ inputs.environment || 'production' }}
    env:
      DEPLOY_WEBHOOK_TOKEN: ${{ secrets.DEPLOY_WEBHOOK_TOKEN }}
      DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
      IMAGE_TAG: ${{ needs.build_and_push.outputs.image_tag }}
    steps:
      - name: Trigger deployment
        shell: bash
        run: |
          if [[ -z "${DEPLOY_WEBHOOK_URL}" ]]; then
            echo "DEPLOY_WEBHOOK_URL is required for production deployment." >&2
            exit 1
          fi

          headers=(-H "Content-Type: application/json")
          if [[ -n "${DEPLOY_WEBHOOK_TOKEN}" ]]; then
            headers+=(-H "Authorization: Bearer ${DEPLOY_WEBHOOK_TOKEN}")
          fi

          payload=$(cat <<JSON
          {
            "environment": "${{ inputs.environment || 'production' }}",
            "version": "${IMAGE_TAG}",
            "images": {
              "api": "${API_IMAGE}:${IMAGE_TAG}",
              "web": "${WEB_IMAGE}:${IMAGE_TAG}",
              "worker": "${WORKER_IMAGE}:${IMAGE_TAG}"
            }
          }
          JSON
          )

          curl --fail --show-error --silent --request POST "${headers[@]}" \
            --data "${payload}" \
            "${DEPLOY_WEBHOOK_URL}"

  smoke:
    name: Post-deploy Smoke Check
    runs-on: ubuntu-latest
    needs: deploy
    environment: ${{ inputs.environment || 'production' }}
    env:
      APP_HEALTHCHECK_URL: ${{ secrets.APP_HEALTHCHECK_URL }}
    steps:
      - name: Verify deployed health endpoint
        shell: bash
        run: |
          if [[ -z "${APP_HEALTHCHECK_URL}" ]]; then
            echo "APP_HEALTHCHECK_URL is required for post-deploy smoke checks." >&2
            exit 1
          fi

          for attempt in {1..12}; do
            if curl --fail --show-error --silent "${APP_HEALTHCHECK_URL}"; then
              exit 0
            fi
            echo "Health check failed on attempt ${attempt}; retrying..."
            sleep 10
          done

          echo "Deployment smoke check failed." >&2
          exit 1
